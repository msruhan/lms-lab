# THM-lite browser proxy policy
# Goal: Firefox can browse Google only. Other domains are blocked.

http_port 3128
visible_hostname thm-lite-proxy
dns_v4_first on

# Keep logs small in lab environment.
cache deny all
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
pid_filename /run/squid.pid

# Traffic source from local browser inside container.
acl localhost src 127.0.0.1/32

# Allowlist for Google Search + static dependencies.
acl google dstdomain .google.com
acl google_static dstdomain .gstatic.com
acl google_apis dstdomain .googleapis.com
acl google_usercontent dstdomain .googleusercontent.com
acl google_safe dstdomain .safebrowsing.googleapis.com

http_access allow localhost google
http_access allow localhost google_static
http_access allow localhost google_apis
http_access allow localhost google_usercontent
http_access allow localhost google_safe
http_access deny all
