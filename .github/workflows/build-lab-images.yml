name: Build & Publish Lab Images

on:
  push:
    branches: [main]
    paths:
      - "thm-lite-desktop/**"
      - "ctf-sqli-lab/**"
      - ".github/workflows/build-lab-images.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Which image to build (all|thm-lite-desktop|ctf-sqli-lab)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - thm-lite-desktop
          - ctf-sqli-lab

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  thm-lite-desktop:
    name: thm-lite-desktop
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'thm-lite-desktop'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/lms-thm-lite-desktop
          tags: |
            type=raw,value=v1
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./thm-lite-desktop
          file: ./thm-lite-desktop/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=thm-lite-desktop
          cache-to: type=gha,mode=max,scope=thm-lite-desktop

  ctf-sqli-lab:
    name: ctf-sqli-lab
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'ctf-sqli-lab'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/lms-ctf-sqli-lab
          tags: |
            type=raw,value=v2
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./ctf-sqli-lab
          file: ./ctf-sqli-lab/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=ctf-sqli-lab
          cache-to: type=gha,mode=max,scope=ctf-sqli-lab
